  <body onload="main()">
    <canvas id="webgl" width="1000" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br />
    <button id="normalOn">Normals On</button>
    <button id="normalOff">Normals Off</button>
    <br />

    <p>
      Light X <input type ="range" min="-250" max="250" value="0" class="slider" id="lsX"></input>
      Light Y <input type ="range" min="-250" max="250" value="100" class="slider" id="lsY"></input>
      Light Z <input type ="range" min="-250" max="250" value="-200" class="slider" id="lsZ"></input>
    </p>

    <p>note, the light inits as like bright yellow and looks weird, just change the color value and its easier to see </p>

    <br />
    <button id="lightOn">Toggle Light</button>
    <button id="switchlight">Toggle SpotLight</button>
    <br />
    <p>Light Color</p>
    <input type="range" min="0", max="100", value="0", class="slider" id="colorslide"></input>
    <span id="fps">FPS: -1</span>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix.js"></script>

    <script src="Vector.js"></script>
    <script src="Camera.js"></script>
    <script src="Triangle.js"></script>
    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
    <script src="World.js"></script>
  </body>
