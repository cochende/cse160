<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>
    </head>
    <body onload="main()">
        <canvas id="example" width="400" height="400"></canvas>
        
        <div id="vector-section" style="padding-bottom: 20px;">
            <div id="v1-params">
                <span>v1: </span>
                <label for="v1-x">x</label>
                <input type="number" id="v1-x" name="v1-x" placeholder="0">

                <label for="v1-y">y</label>
                <input type="number" id="v1-y" name="v1-y" placeholder="0">
            </div>

            <div id="v2-params"
                <span>v2: </span>
                <label for="v2-x">x</label>
                <input type="number" id="v2-x" name="v2-x" placeholder="0">

                <label for="v2-y">y</label>
                <input type="number" id="v2-y" name="v2-y" placeholder="0">
            </div>

            <input 
                onclick="handleDrawEvent()" 
                type="button" 
                id="vector-submit" 
                value="Draw"
            >
        </div>
        <div id="operation-section">
            <div id="op-params">
                <label for="op">Operation: </label>
                <select id="op">
                    <option value="add">Add</option>
                    <option value="sub">Subtract</option>
                    <option value="mul">Multiply</option>
                    <option value="div">Divide</option>
                    <option value="mag">Magnitude</option>
                    <option value="norm">Normalize</option>
                    <option value="angl">Angle Between</option>
                    <option value="area">Area</option>
                </select>

                <label for="scalar">Scalar:</label>
                <input type="number" id="scalar" name="scalar" placeholder="1">

            </div>
        <input 
            onclick="handleDrawOperationEvent()" 
            type="button" 
            id="operation-submit" 
            value="Draw"
        >
        </div>

        <script src="asgn0.js"></script>
        <script src="lib/cuon-matrix-cse160.js"></script>
    </body>
</html>
